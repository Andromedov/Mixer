name: Dev Build

on:
  push:
    branches:
      - "dev/**"
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "hotfix/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_dev:
    if: "!contains(github.event.head_commit.message, '[release]') && !contains(github.event.head_commit.message, '[pre-release]') && !contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Generate Short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build --no-daemon

      - name: Rename Artifact with Dynamic Suffix
        id: rename
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '/' '-')
          
          if [[ "$BRANCH_NAME" == dev/* ]]; then
            SUFFIX="-SNAPSHOT"
          else
            SUFFIX="-$SAFE_BRANCH_NAME"
          fi
          
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT
          echo "safe_branch=$SAFE_BRANCH_NAME" >> $GITHUB_OUTPUT
          
          cd build/libs
          for file in *.jar; do
            if [[ "$file" != *"-plain.jar"* && "$file" != *"-sources.jar"* && "$file" != *"-javadoc.jar"* ]]; then
              NEW_NAME="${file%.jar}${SUFFIX}.jar"
              mv "$file" "$NEW_NAME"
              echo "Renamed $file to $NEW_NAME"
            fi
          done

      - name: Upload Dev Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mixer-${{ steps.rename.outputs.safe_branch }}-${{ steps.vars.outputs.SHORT_SHA }}
          path: build/libs/*${{ steps.rename.outputs.suffix }}.jar
          retention-days: 7